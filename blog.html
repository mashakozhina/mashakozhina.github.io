      font-size: 1.25rem; font-style: italic; font-weight: 300;
      line-height: 1.7; color: var(--text-mid);
      margin-bottom: 2.5rem;

    @media (max-width: 860px) {

</head>

  <nav>

  <div class="page-top">

        Thoughts & <em>reflections</em>

      <p class="blog-msg">
        My blog lives on Squarespace while I'm finishing moving everything over.<br>
        Click below to read my latest writing.

        Read the Blog
      </a>

  <div class="barcelona-section">

  <script>
    const io = new IntersectionObserver(entries => entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
    }), { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>
</body>
